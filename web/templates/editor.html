<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reploy — Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/dracula.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/foldgutter.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2/dist/css/tom-select.default.min.css" />
  <style>
    /* Search match highlights */
    .cm-search-match         { background: rgba(255,200,0,.28); border-radius: 2px; }
    .cm-search-match-current { background: rgba(255,160,0,.75); border-radius: 2px; }
    /* Fold gutter — dark theme */
    .CodeMirror-foldgutter-open, .CodeMirror-foldgutter-folded { color: #6272a4; cursor: pointer; padding: 0 2px; }
    .CodeMirror-foldgutter-open:hover, .CodeMirror-foldgutter-folded:hover { color: #f8f8f2; }
    #code-editor { display: none; }
    .CodeMirror { height: 100%; font-size: 14px; }
    #editor-wrap { height: calc(100vh - 56px); }
    /* Tom Select — white theme */
    .ts-wrapper .ts-control { border-radius: .5rem; border-color: #e5e7eb; background: #fff; box-shadow: none; }
    .ts-wrapper.focus .ts-control { border-color: #d1d5db; box-shadow: 0 0 0 3px rgba(0,0,0,.06); outline: none; }
    .ts-control .item { background: #f3f4f6; color: #374151; border-color: #e5e7eb; border-radius: 9999px; }
    .ts-control .item.active { background: #e5e7eb; color: #374151; }
    .ts-control .item .remove { color: #9ca3af; border-left-color: #e5e7eb; }
    .ts-control .item .remove:hover { background: transparent; color: #374151; }
    .ts-dropdown { border-color: #e5e7eb; border-radius: .5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,.07); }
    .ts-dropdown-content .option.active { background: #f9fafb; color: #111827; }
    .ts-dropdown-content .option.selected { color: #6b7280; }
    .ts-dropdown-content .option.selected.active { background: #f3f4f6; }
    .ts-dropdown .create { color: #374151; }
  </style>
</head>
<body class="bg-gray-900 text-white flex flex-col h-screen overflow-hidden">

  <!-- Toolbar -->
  <div class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 gap-2 shrink-0">
    <!-- Back arrow (always visible) -->
    <a href="/dashboard" class="text-indigo-400 hover:text-indigo-300 text-sm shrink-0">←</a>

    <!-- Desktop: separator + title + status -->
    <span class="text-gray-500 shrink-0 hidden sm:inline">|</span>
    <input id="app-title" type="text" maxlength="80"
      class="hidden sm:block bg-transparent text-white text-sm font-medium focus:outline-none w-36 border-b border-transparent focus:border-indigo-400 transition shrink-0" />
    <span class="text-gray-600 text-xs shrink-0 hidden sm:inline" id="save-status-desktop">Saved</span>

    <!-- Gear icon (always visible) -->
    <button onclick="openInfoModal()" title="App settings"
      class="text-gray-400 hover:text-white transition shrink-0 p-1.5 rounded hover:bg-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <!-- Copy All icon (always visible) -->
    <button id="btn-copy-all" onclick="copyAll()" title="Copy all"
      class="text-gray-400 hover:text-white transition shrink-0 p-1.5 rounded hover:bg-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>

    <!-- Select All icon (always visible) -->
    <button onclick="selectAll()" title="Select all"
      class="text-gray-400 hover:text-white transition shrink-0 p-1.5 rounded hover:bg-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
      </svg>
    </button>

    <!-- Paste icon (always visible) -->
    <button id="btn-paste" onclick="pasteIntoEditor()" title="Paste"
      class="text-gray-400 hover:text-white transition shrink-0 p-1.5 rounded hover:bg-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
      </svg>
    </button>

    <!-- Save status (mobile only, inline) -->
    <span class="text-gray-600 text-xs shrink-0 sm:hidden" id="save-status">Saved</span>

    <div class="ml-auto flex items-center gap-1 shrink-0">
      <!-- Desktop: URL + Copy link text -->
      <span id="public-url" class="text-xs text-gray-400 hidden sm:block truncate max-w-[180px]"></span>
      <button onclick="copyLink()" class="text-xs text-gray-400 hover:text-white transition hidden sm:block">Copy link</button>

      <!-- Preview: eye icon on mobile, text on desktop -->
      <a id="preview-btn" href="#" target="_blank" title="Preview"
        class="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition px-3 py-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="hidden sm:inline text-sm">Preview</span>
      </a>

      <!-- Save: floppy disk icon on mobile, text on desktop -->
      <button onclick="saveNow()" title="Save"
        class="flex items-center gap-1.5 bg-green-600 hover:bg-green-500 text-white rounded-lg transition px-3 py-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span class="hidden sm:inline text-sm">Save</span>
      </button>

      <!-- Profile dropdown (top-right corner) -->
      <div class="relative shrink-0 mt-2" id="profile-menu">
        <button onclick="toggleProfile()" class="focus:outline-none ml-1">
          <img id="nav-avatar" src="" alt="" class="w-7 h-7 rounded-full object-cover border border-gray-600 hover:ring-2 hover:ring-gray-500 transition" />
        </button>
        <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-64 bg-white border border-gray-200 rounded-xl shadow-lg z-50 overflow-hidden text-left">
          <div class="px-4 py-4 border-b border-gray-100">
            <div class="flex items-center gap-3 mb-2">
              <img id="dd-avatar" src="" alt="" class="w-10 h-10 rounded-full object-cover shrink-0" />
              <div class="min-w-0">
                <p id="dd-name" class="text-sm font-medium text-gray-800 truncate"></p>
                <p id="dd-email" class="text-xs text-gray-400 truncate"></p>
              </div>
            </div>
            <p id="dd-stats" class="text-xs text-gray-400"></p>
          </div>
          <button onclick="fetch('/auth/logout',{method:'POST'}).then(()=>location.href='/')" class="w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-50 transition">Sign Out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CodeMirror -->
  <div id="editor-wrap" class="flex-1 overflow-hidden relative">
    <textarea id="code-editor"></textarea>
    <!-- Custom search bar -->
    <div id="search-bar" class="hidden absolute top-0 right-4 z-40 flex items-center gap-2 bg-gray-800 border border-gray-600 border-t-0 rounded-b-lg px-3 py-2 shadow-xl">
      <input id="search-input" type="text" placeholder="Find in file…"
        oninput="doSearch()" onkeydown="handleSearchKey(event)"
        class="bg-gray-700 text-white text-sm px-2 py-1 rounded outline-none border border-gray-600 focus:border-indigo-400 w-44 placeholder-gray-500" />
      <span id="search-count" class="text-gray-400 text-xs w-16 text-center shrink-0"></span>
      <button onclick="searchPrev()" title="Previous (Shift+Enter)" class="text-gray-300 hover:text-white p-1 rounded hover:bg-gray-700">↑</button>
      <button onclick="searchNext()" title="Next (Enter)" class="text-gray-300 hover:text-white p-1 rounded hover:bg-gray-700">↓</button>
      <button onclick="closeSearch()" title="Close (Esc)" class="text-gray-400 hover:text-white p-1 rounded hover:bg-gray-700 ml-1">✕</button>
    </div>
  </div>

  <!-- App Info Modal -->
  <div id="info-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-4">
    <div class="bg-white text-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-md">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-bold">App Info</h2>
        <button onclick="closeInfoModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
      </div>
      <label class="block text-xs text-gray-500 mb-1">Title</label>
      <input id="info-title" type="text" maxlength="80"
        class="w-full border rounded-lg px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <label class="block text-xs text-gray-500 mb-1">URL Slug <span class="text-gray-400">reploy.spyc.hk/&lt;pyccode&gt;/<span id="info-slug-preview" class="text-indigo-500"></span></span></label>
      <input id="info-slug" type="text" maxlength="60"
        class="w-full border rounded-lg px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        placeholder="my-cool-app" oninput="updateSlugPreview()" />
      <p id="info-slug-error" class="text-red-500 text-xs mb-2 hidden"></p>
      <label class="block text-xs text-gray-500 mb-1">Description</label>
      <textarea id="info-description" rows="3" maxlength="300"
        class="w-full border rounded-lg px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"
        placeholder="Briefly describe what your app does…"></textarea>
      <label class="block text-xs text-gray-500 mb-1">Category</label>
      <div class="mb-4"><select id="info-category" multiple placeholder="Add categories…"></select></div>
      <div class="flex justify-end gap-3">
        <button onclick="closeInfoModal()" class="text-sm text-gray-500 hover:underline">Cancel</button>
        <button onclick="saveInfo()"
          class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closetag.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/foldcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/foldgutter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/xml-fold.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/brace-fold.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/display/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/comment/comment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/searchcursor.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2/dist/js/tom-select.complete.min.js"></script>

  <script>
    const APP_ID  = '{{.app_id}}';
    const PYCCODE = '{{.pyccode}}';
    let app = null, saveTimer = null, tsCategory = null;

    const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
      mode: 'htmlmixed',
      theme: 'dracula',
      lineNumbers: true,
      autoCloseTags: true,
      matchBrackets: true,
      lineWrapping: true,
      tabSize: 2,
      indentWithTabs: false,
      foldGutter: true,
      gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
      extraKeys: {
        'Ctrl-/': 'toggleComment',
        'Cmd-/':  'toggleComment',
      },
    });

    editor.on('change', () => {
      setStatus('Unsaved…');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveNow, 2000);
    });

    // --- Info modal ---
    function openInfoModal() {
      if (!app) return;
      document.getElementById('info-title').value = app.title || '';
      document.getElementById('info-slug').value = app.slug || '';
      document.getElementById('info-description').value = app.description || '';
      if (tsCategory) tsCategory.destroy();
      const cats = app.category || [];
      tsCategory = new TomSelect('#info-category', {
        create: true,
        plugins: ['remove_button'],
        createOnBlur: true,
        persist: false,
        options: cats.map(c => ({ value: c, text: c })),
        items: cats,
      });
      document.getElementById('info-modal').classList.remove('hidden');
    }

    function closeInfoModal() {
      document.getElementById('info-modal').classList.add('hidden');
    }

    function updateSlugPreview() {
      const v = document.getElementById('info-slug').value;
      document.getElementById('info-slug-preview').textContent = v;
    }

    async function saveInfo() {
      const title       = document.getElementById('info-title').value.trim();
      const slug        = document.getElementById('info-slug').value.trim().toLowerCase();
      const description = document.getElementById('info-description').value.trim();
      const category    = tsCategory.getValue();
      const slugErrEl   = document.getElementById('info-slug-error');
      slugErrEl.classList.add('hidden');
      if (!title) return;
      if (!slug) { slugErrEl.textContent = 'Slug is required.'; slugErrEl.classList.remove('hidden'); return; }
      if (!/^[a-z0-9-]+$/.test(slug)) { slugErrEl.textContent = 'Slug may only contain lowercase letters, numbers, and hyphens.'; slugErrEl.classList.remove('hidden'); return; }
      const html = editor.getValue();
      if (html.length > 500 * 1024) { setStatus('⚠ File exceeds 500 KB limit'); closeInfoModal(); return; }
      setStatus('Saving…');
      const res = await fetch(`/api/apps/${APP_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, slug, description, html_content: html, category }),
      });
      if (res.ok) {
        app.title = title;
        app.slug = slug;
        app.description = description;
        app.category = category;
        document.getElementById('app-title').value = title;
        updatePreviewLink();
        setStatus('Saved ✓');
        closeInfoModal();
      } else {
        const d = await res.json();
        setStatus('Save failed: ' + (d.error || 'unknown error'));
        closeInfoModal();
      }
    }

    // --- Init ---
    async function copyAll() {
      await navigator.clipboard.writeText(editor.getValue());
      setStatus('Copied!');
    }

    function selectAll() {
      editor.execCommand('selectAll');
      editor.focus();
    }

    async function pasteIntoEditor() {
      try {
        const text = await navigator.clipboard.readText();
        editor.setValue(text);
        setStatus('Pasted!');
      } catch(e) {
        setStatus('Paste failed — check clipboard permission');
      }
    }

    // --- Init ---
    async function init() {
      const me = await fetch('/api/me').then(r => r.json());
      setProfileUI(me);
      const res = await fetch(`/api/apps/${APP_ID}`);
      if (!res.ok) { alert('Could not load app.'); return; }
      app = await res.json();
      document.getElementById('app-title').value = app.title;
      editor.setValue(app.html_content);
      editor.clearHistory();
      setStatus('Saved');
      updatePreviewLink();
    }

    function updatePreviewLink() {
      if (!app) return;
      const url = `${location.origin}/${PYCCODE}/${app.slug}`;
      document.getElementById('public-url').textContent = url;
      document.getElementById('preview-btn').href = url;
    }

    async function saveNow() {
      if (!app) return;
      const title    = document.getElementById('app-title').value.trim() || app.title;
      const html     = editor.getValue();
      const category = app.category || [];
      if (html.length > 500 * 1024) { setStatus('⚠ File exceeds 500 KB limit'); return; }
      setStatus('Saving…');
      const res = await fetch(`/api/apps/${APP_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: app.description || '', html_content: html, category }),
      });
      if (res.ok) { app.title = title; setStatus('Saved ✓'); }
      else { const d = await res.json(); setStatus('Save failed: ' + (d.error || 'unknown error')); }
    }

    function setStatus(msg) {
      ['save-status', 'save-status-desktop'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = msg;
      });
    }

    function copyLink() {
      if (!app) return;
      navigator.clipboard.writeText(`${location.origin}/${PYCCODE}/${app.slug}`)
        .then(() => setStatus('Link copied!'));
    }

    function toggleProfile() {
      document.getElementById('profile-dropdown').classList.toggle('hidden');
    }
    document.addEventListener('click', e => {
      const m = document.getElementById('profile-menu');
      if (m && !m.contains(e.target)) document.getElementById('profile-dropdown').classList.add('hidden');
    });
    function setProfileUI(me) {
      const av = me.avatar_url || '';
      ['nav-avatar', 'dd-avatar'].forEach(id => { const el = document.getElementById(id); if (el) el.src = av; });
      document.getElementById('dd-name').textContent = me.name || me.display_name || me.pyccode;
      document.getElementById('dd-email').textContent = me.email || '';
      const t = me.app_count || 0, s = me.shelf_count || 0;
      document.getElementById('dd-stats').textContent = `${t} app${t !== 1 ? 's' : ''} · ${s} on shelf`;
    }

    // --- Search ---
    let searchMatches = [], searchIndex = -1, searchMarks = [];

    function openSearch() {
      const bar = document.getElementById('search-bar');
      bar.classList.remove('hidden');
      const input = document.getElementById('search-input');
      const sel = editor.getSelection();
      if (sel && sel.length < 200) input.value = sel;
      input.focus();
      input.select();
      if (input.value) doSearch();
    }

    function closeSearch() {
      document.getElementById('search-bar').classList.add('hidden');
      searchMarks.forEach(m => m.clear());
      searchMarks = [];
      searchMatches = [];
      searchIndex = -1;
      document.getElementById('search-count').textContent = '';
      editor.focus();
    }

    function doSearch() {
      searchMarks.forEach(m => m.clear());
      searchMarks = [];
      searchMatches = [];
      const query = document.getElementById('search-input').value;
      if (!query) { document.getElementById('search-count').textContent = ''; return; }
      const cursor = editor.getSearchCursor(query, CodeMirror.Pos(0, 0), { caseFold: true });
      while (cursor.findNext()) {
        searchMatches.push({ from: cursor.from(), to: cursor.to() });
      }
      if (searchMatches.length) {
        searchIndex = 0;
        applySearchMarks();
        editor.scrollIntoView(searchMatches[0], 80);
        editor.setSelection(searchMatches[0].from, searchMatches[0].to);
      } else {
        document.getElementById('search-count').textContent = 'No results';
      }
    }

    function applySearchMarks() {
      searchMarks.forEach(m => m.clear());
      searchMarks = searchMatches.map((m, i) =>
        editor.markText(m.from, m.to, {
          className: i === searchIndex ? 'cm-search-match-current' : 'cm-search-match'
        })
      );
      const el = document.getElementById('search-count');
      el.textContent = `${searchIndex + 1} / ${searchMatches.length}`;
    }

    function searchNext() {
      if (!searchMatches.length) return;
      searchIndex = (searchIndex + 1) % searchMatches.length;
      applySearchMarks();
      editor.scrollIntoView(searchMatches[searchIndex], 80);
      editor.setSelection(searchMatches[searchIndex].from, searchMatches[searchIndex].to);
    }

    function searchPrev() {
      if (!searchMatches.length) return;
      searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
      applySearchMarks();
      editor.scrollIntoView(searchMatches[searchIndex], 80);
      editor.setSelection(searchMatches[searchIndex].from, searchMatches[searchIndex].to);
    }

    function handleSearchKey(e) {
      if (e.key === 'Enter')  { e.preventDefault(); e.shiftKey ? searchPrev() : searchNext(); }
      if (e.key === 'Escape') { e.preventDefault(); closeSearch(); }
    }

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveNow(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); openSearch(); }
    });

    init();
  </script>
</body>
</html>
