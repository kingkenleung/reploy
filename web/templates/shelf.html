<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reploy — Shelf</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b px-6 py-3 flex items-center justify-between">
    <span class="text-indigo-600 font-bold text-xl">Reploy</span>
    <div class="flex gap-4 items-center">
      <a href="/dashboard" class="text-sm text-indigo-600 hover:underline">My Apps</a>
      <a href="/shelf" class="text-sm font-medium text-indigo-700 underline">Shelf</a>
      <a id="admin-link" href="/admin" class="hidden text-sm text-indigo-600 hover:underline">Admin Panel</a>
      <div class="relative" id="profile-menu">
        <button onclick="toggleProfile()" class="focus:outline-none">
          <img id="nav-avatar" src="" alt="" class="w-8 h-8 rounded-full object-cover border border-gray-200 hover:ring-2 hover:ring-gray-300 transition" />
        </button>
        <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-64 bg-white border border-gray-200 rounded-xl shadow-lg z-50 overflow-hidden">
          <div class="px-4 py-4 border-b border-gray-100">
            <div class="flex items-center gap-3 mb-2">
              <img id="dd-avatar" src="" alt="" class="w-10 h-10 rounded-full object-cover shrink-0" />
              <div class="min-w-0">
                <p id="dd-name" class="text-sm font-medium text-gray-800 truncate"></p>
                <p id="dd-email" class="text-xs text-gray-400 truncate"></p>
              </div>
            </div>
            <p id="dd-stats" class="text-xs text-gray-400"></p>
          </div>
          <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-50 transition">Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">App Shelf</h1>
        <p class="text-sm text-gray-500 mt-0.5">Approved apps from everyone</p>
      </div>
      <div class="flex gap-2 flex-wrap">
        <input id="search" type="text" placeholder="Search…" oninput="applyFilters()"
          class="border rounded-lg px-3 py-2 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <select id="filter-cat" onchange="applyFilters()"
          class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full text-center py-16 text-gray-400">Loading…</div>
    </div>
  </main>

  <script>
    let allApps = [], studMap = {};

    async function init() {
      const me = await fetch('/api/me').then(r => r.json());
      if (me.role === 'teacher') document.getElementById('admin-link').classList.remove('hidden');
      setProfileUI(me);

      try {
        const studs = await fetch('https://www5.pyc.edu.hk/pycnet/api/stud_list.php').then(r => r.json());
        studs.forEach(s => { studMap[s.pyccode] = s; });
      } catch(e) {}

      const apps = await fetch('/api/shelf').then(r => r.json());
      allApps = apps || [];
      buildCategoryFilter(allApps);
      applyFilters();
    }

    function displayName(pyccode) {
      const s = studMap[pyccode];
      return s ? `${s.cls} ${s.num} ${s.userename}` : pyccode;
    }

    function buildCategoryFilter(apps) {
      const cats = [...new Set(apps.flatMap(a => Array.isArray(a.category) ? a.category : []).filter(Boolean))].sort();
      const sel = document.getElementById('filter-cat');
      sel.innerHTML = '<option value="">All Categories</option>' +
        cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
    }

    function applyFilters() {
      const q   = document.getElementById('search').value.toLowerCase();
      const cat = document.getElementById('filter-cat').value;
      const filtered = allApps.filter(a => {
        const matchQ   = !q || a.title.toLowerCase().includes(q) || (a.owner_pyccode || '').toLowerCase().includes(q);
        const matchCat = !cat || (Array.isArray(a.category) && a.category.includes(cat));
        return matchQ && matchCat;
      });
      render(filtered);
    }

    function render(apps) {
      const grid = document.getElementById('grid');
      if (!apps.length) {
        grid.innerHTML = '<div class="col-span-full text-center py-16 text-gray-400">No apps found.</div>';
        return;
      }
      grid.innerHTML = apps.map(a => {
        const cats = Array.isArray(a.category) ? a.category : [];
        const author = displayName(a.owner_pyccode || '');
        const url = `/${esc(a.owner_pyccode)}/${esc(a.slug)}`;
        return `
        <div class="bg-white rounded-xl border hover:shadow-md transition flex flex-col">
          <div class="p-5 flex-1">
            <div class="flex flex-wrap gap-1 mb-2">
              ${cats.map(c => `<span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">${esc(c)}</span>`).join('')}
            </div>
            <h2 class="font-semibold text-gray-800 text-base leading-snug mb-1">${esc(a.title)}</h2>
            <p class="text-xs text-gray-500 line-clamp-2 mb-3">${esc(a.description || '')}</p>
            <p class="text-xs text-gray-400">by ${esc(author)}</p>
          </div>
          <div class="px-5 pb-4">
            <a href="${url}" target="_blank"
              class="block w-full text-center bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition">
              Open App
            </a>
          </div>
        </div>`;
      }).join('');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toggleProfile() {
      document.getElementById('profile-dropdown').classList.toggle('hidden');
    }
    document.addEventListener('click', e => {
      const m = document.getElementById('profile-menu');
      if (m && !m.contains(e.target)) document.getElementById('profile-dropdown').classList.add('hidden');
    });
    function setProfileUI(me) {
      const av = me.avatar_url || '';
      ['nav-avatar', 'dd-avatar'].forEach(id => { const el = document.getElementById(id); if (el) el.src = av; });
      document.getElementById('dd-name').textContent = me.name || me.display_name || me.pyccode;
      document.getElementById('dd-email').textContent = me.email || '';
      const t = me.app_count || 0, s = me.shelf_count || 0;
      document.getElementById('dd-stats').textContent = `${t} app${t !== 1 ? 's' : ''} · ${s} on shelf`;
    }

    async function logout() { await fetch('/auth/logout', { method: 'POST' }); location.href = '/'; }

    init();
  </script>
</body>
</html>
